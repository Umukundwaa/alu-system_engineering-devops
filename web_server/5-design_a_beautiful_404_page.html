<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>404 Lost in Space</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#03010a;--accent:#ff4d6d;--accent2:#c77dff;--dim:#555577}
html,body{width:100%;height:100%;background:var(--bg);color:#e0e0e0;font-family:monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.container{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:2rem}
.big-404{font-size:clamp(6rem,20vw,16rem);font-weight:900;color:var(--accent);line-height:1}
.tagline{font-size:1.5rem;color:var(--accent);text-transform:uppercase;margin:1rem 0}
.sub{color:var(--dim);margin-bottom:1.5rem;line-height:1.7}
.required-string{color:var(--dim);margin-bottom:2rem;font-size:0.8rem}
.btn{padding:0.75rem 2rem;border:1px solid var(--accent);color:var(--accent);text-decoration:none;font-size:0.8rem;text-transform:uppercase}
.scan-line{position:fixed;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,var(--accent2),transparent);animation:scan 5s linear infinite;opacity:0.4}
@keyframes scan{0%{top:0}100%{top:100%}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="scan-line"></div>
<div class="container">
<div class="big-404">404</div>
<p class="tagline">Signal Lost</p>
<p class="sub">Houston, we have a problem.<br>The page drifted into the void.</p>
<p class="required-string">Ceci n est pas une page</p>
<a href="/" class="btn">Return to base</a>
</div>
<script>
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
let stars=[];
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;stars=Array.from({length:200},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5,a:Math.random(),speed:Math.random()*0.3+0.05}));}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{s.a+=s.speed*0.01;const o=(Math.sin(s.a)+1)/2;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,"+o*0.8+")";ctx.fill();});requestAnimationFrame(draw);}
window.addEventListener("resize",resize);resize();draw();
</script>
</body>
</html>
